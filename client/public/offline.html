<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#031129" />
    <title>Get Tilted Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at top, #0a2b66 0%, #031129 65%);
        color: #e7efff;
      }

      .card {
        width: min(480px, calc(100vw - 2rem));
        border: 1px solid #3d5e94;
        border-radius: 14px;
        padding: 1.25rem;
        background: rgba(4, 18, 45, 0.82);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.2rem;
      }

      p {
        margin: 0;
        line-height: 1.35;
        color: #c7d7ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Offline right now</h1>
      <p>Get Tilted could not reach the network. Reconnect and reopen the app to continue racing.</p>
    </main>
  </body>
</html>
